<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Municipal</title>
    <meta name="author" content="alexielretamales@liceovvh.cl">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container-fluid">
    <a class="navbar-brand" href="#">Evaluacion</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav">
            <a class="nav-link active" href="#">Home</a>
            <a class="nav-link" href="#">Features</a>
            <a class="nav-link" href="#">Pricing</a>
            <a class="nav-link" href="#" aria-disabled="true">Disabled</a>
        </div>
    </div>
</div>
</nav>
</header>

<div class="container mt-4">

<section id="tesoreria" class="mb-5">
    <h3>Módulo de Tesorería</h3>
    <input type="number" id="monto" class="form-control mb-2" placeholder="Ingrese monto">
    <button class="btn btn-success" onclick="calcularPago()">Calcular</button>
    <p id="resultadoTesoreria" class="mt-2"></p>
</section>

<section id="salud" class="mb-5">
    <h3>Módulo de Salud</h3>
    <input type="text" id="nombreSalud" class="form-control mb-2" placeholder="Ingrese nombre">
    <button class="btn btn-primary" onclick="agregarNormal()">Normal</button>
    <button class="btn btn-danger" onclick="agregarUrgencia()">Urgencia</button>

    <ol id="listaSalud" class="mt-3"></ol>
</section>

<section id="subsidios" class="mb-5">
    <h3>Módulo de Subsidios</h3>
    <input type="text" id="buscarNombre" class="form-control mb-2" placeholder="Ingrese nombre o RUT">
    <button class="btn btn-warning" onclick="buscarBeneficiario()">Buscar</button>
    <p id="resultadoSubsidio" class="mt-2"></p>
</section>

</div>

<script src="static/js/script.js"></script>
    
</body>
</html>
